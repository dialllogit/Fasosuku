version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: fasosuku-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: FasoSuku2024!
      MONGO_INITDB_DATABASE: fasosuku
    volumes:
      - mongodb_data:/data/db
      - ./backend/scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - fasosuku-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: fasosuku-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - fasosuku-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Node.js
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fasosuku-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:FasoSuku2024!@mongodb:27017/fasosuku?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_jwt_secret_key_change_in_production
      JWT_EXPIRE: 24h
      PAYMENT_PROVIDER_API_KEY: ${PAYMENT_PROVIDER_API_KEY:-dev_key}
      PAYMENT_PROVIDER_SECRET: ${PAYMENT_PROVIDER_SECRET:-dev_secret}
      AWS_S3_BUCKET: fasosuku-files
      AWS_REGION: eu-west-1
      PORT: 5000
      HOST: 0.0.0.0
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/uploads:/app/uploads
    networks:
      - fasosuku-network
    command: npm run dev
    restart: unless-stopped

  # Frontend (optionnel en Docker)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fasosuku-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://backend:5000
      VITE_APP_NAME: FasoSuku
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - fasosuku-network
    command: npm run dev
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  fasosuku-network:
    driver: bridge
